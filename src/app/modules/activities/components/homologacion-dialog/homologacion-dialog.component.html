<h2 mat-dialog-title>Agregar Homologación</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="dialog-form">

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Nombre en Sistema Externo</mat-label>
      <input matInput formControlName="nombreExterno" placeholder="Ej: Leonardo Francisco Agurto Coello"
        id="input-nombre-externo">
      <mat-hint>Ingrese el nombre tal como aparece en el sistema externo (SIGD, etc.)</mat-hint>
      <mat-error *ngIf="form.get('nombreExterno')?.hasError('required')">
        El nombre es requerido
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Colaborador TMR</mat-label>
      <mat-select formControlName="employeeID" id="select-colaborador-tmr">
        <mat-option>
          <ngx-mat-select-search [formControl]="employeeFilterCtrl" placeholderLabel="Buscar colaborador..."
            noEntriesFoundLabel="Sin resultados">
          </ngx-mat-select-search>
        </mat-option>
        <mat-option *ngFor="let emp of filteredEmployees | async" [value]="emp.id">
          {{ emp.nombre }}
        </mat-option>
      </mat-select>
      <mat-error *ngIf="form.get('employeeID')?.hasError('required')">
        El colaborador es requerido
      </mat-error>
    </mat-form-field>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()" id="btn-cancelar-homologacion">Cancelar</button>
  <button mat-raised-button color="primary" (click)="save()" [disabled]="form.invalid || isSaving"
    id="btn-guardar-homologacion">
    <mat-icon *ngIf="isSaving">
      <mat-spinner diameter="18"></mat-spinner>
    </mat-icon>
    Guardar
  </button>
</mat-dialog-actions>
