<div class="general-data-container">

  <section class="panel left-panel">
    <h2 class="section-title">Datos generales del cliente</h2>

    <div class="form-group">
      <label for="cliente">Cliente</label>
      <select id="cliente" class="form-control">
        <option value="" disabled selected>Seleccione un cliente</option>
        <option value="1">BCO GYE</option>
        <option value="2">BCO BOLIVARIANO</option>
        <option value="3">BCO DEL PACIFICO</option>
      </select>
    </div>

    <div class="form-group">
      <label for="cargo">Cargo de vacante</label>
      <select id="cargo" class="form-control">
        <option value="" disabled selected>Seleccione un cargo</option>
        <option value="dev">DEV.FULLSTACK</option>
        <option value="qa">ANALISTA QA</option>
        <option value="net">DESARROLLADOR .NET</option>
      </select>
    </div>
  </section>


  <section class="panel right-panel">
    <h2 class="section-title">
      <span class="icon">👤</span> Persona de Contacto
    </h2>

    <div class="form-group">
      <label for="nombres">Nombres <span class="required">*</span></label>
      <input type="text" id="nombres" class="form-control" placeholder="Ingrese los nombres">
    </div>

    <div class="form-group">
      <label for="apellidos">Apellidos <span class="required">*</span></label>
      <input type="text" id="apellidos" class="form-control" placeholder="Ingrese los apellidos">
    </div>

    <div class="form-group">
      <label for="correo">Correo Electrónico (Opcional)</label>
      <input type="email" id="correo" class="form-control" placeholder="correo@ejemplo.com">
    </div>
  </section>

</div>
