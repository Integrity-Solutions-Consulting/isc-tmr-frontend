<div class="knowledge-container">

  <header class="header">

      <svg xmlns="http://www.w3.org/2000/svg" class="book-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>

  <section class="form-content">

    <div class="form-group">
      <label for="otros-conocimientos">Otros Conocimientos</label>

      <label for="certificaciones">Certificaciones</label>
      <textarea id="certificaciones" class="form-control" rows="3" placeholder="Liste las certificaciones requeridas..."></textarea>

    <div class="form-group">
      <label for="comentarios">Comentarios Adicionales</label>
      <textarea id="comentarios" class="form-control" rows="3" placeholder="Comentarios o información adicional..."></textarea>
    </div>

  </section>
