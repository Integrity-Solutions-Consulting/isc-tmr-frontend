<div class="payment-schedule-container">

  <header class="header">
    <div class="title-group">
      <svg xmlns="http://www.w3.org/2000/svg" class="dollar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="1" x2="12" y2="23"></line>
        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
      </svg>
      <h1>Forma de Pago y Horario - Opcional</h1>
    </div>
  </header>

  <section class="form-content">

    <div class="row-group">

      <div class="form-group">
        <label for="presupuesto">Presupuesto:</label>
        <input type="number" id="presupuesto" class="form-control" placeholder="Ingrese el presupuesto">
      </div>

      <div class="form-group">
        <label for="ciudad">Ciudad de trabajo</label>
        <select id="ciudad" class="form-control">
          <option value="" disabled selected>Seleccione una ciudad</option>
          <option value="gye">Guayaquil</option>
          <option value="uio">Quito</option>
          <option value="cue">Cuenca</option>
        </select>
      </div>

    </div>

    <div class="form-group">
      <label for="horario">Horario de Trabajo</label>
      <input type="text" id="horario" class="form-control" placeholder="Ej: Lunes a Viernes 8:00 AM - 5:00 PM">
    </div>

  </section>
</div>
