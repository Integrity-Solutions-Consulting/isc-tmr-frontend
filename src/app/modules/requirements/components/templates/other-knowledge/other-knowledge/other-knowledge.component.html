<div class="knowledge-container" *ngIf="knowledgeForm" [formGroup]="knowledgeForm">

  <header class="header">
    <div class="title-group">
      <mat-icon class="knowledge-icon">school</mat-icon>
      <h1>Otros Conocimientos - Opcional</h1>
    </div>
  </header>

  <section class="form-content">

    <div class="form-group">
      <label>Otros Conocimientos</label>
      <textarea class="form-control" rows="4"
                placeholder="Describa otros conocimientos específicos..."
                formControlName="otherKnowledge"></textarea>
    </div>

    <div class="form-group">
      <label>Certificaciones</label>
      <textarea class="form-control" rows="3"
                placeholder="Liste las certificaciones requeridas..."
                formControlName="otherCertification"></textarea>
    </div>

    <div class="form-group">
      <label>Comentarios Adicionales</label>
      <textarea class="form-control" rows="3"
                placeholder="Comentarios o información adicional..."
                formControlName="additionalComments"></textarea>
    </div>

  </section>
</div>
