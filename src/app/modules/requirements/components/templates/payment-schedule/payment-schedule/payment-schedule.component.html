<div class="payment-schedule-container">

  <header class="header">
    <div class="title-group">
      <mat-icon class="dollar-icon">attach_money</mat-icon>
      <h1 class="main-title">Forma de Pago y Horario <small>- Opcional</small></h1>
    </div>
  </header>

  <form [formGroup]="paymentScheduleForm" class="form-content">

    <div class="form-row">

      <div class="form-group">
        <label for="presupuesto">Presupuesto</label>
        <input type="number" id="presupuesto" class="form-control" placeholder="Ingrese el presupuesto" formControlName="budget">
      </div>

      <div class="form-group">
        <label>Ciudad de trabajo</label>
        <ng-select
          [items]="cities()"
          bindLabel="workcity_name"
          bindValue="workCityID"
          formControlName="workCityId"
          placeholder="Seleccione una ciudad"
          [clearable]="true"
          >
        </ng-select>
      </div>

    </div>

    <div class="form-group">
      <label for="horario">Horario de Trabajo</label>
      <input type="text" id="horario" class="form-control" placeholder="Ej: Lunes a Viernes 8:00 AM - 5:00 PM" formControlName="schedule">
    </div>

  </form>
</div>
