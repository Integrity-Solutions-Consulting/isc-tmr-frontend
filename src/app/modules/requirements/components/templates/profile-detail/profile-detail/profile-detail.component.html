<div class="profile-detail-container">
  <form [formGroup]="profileDetailForm">

  <header class="header">
    <div class="title-group">
      <svg xmlns="http://www.w3.org/2000/svg" class="profile-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
        <circle cx="12" cy="7" r="4"></circle>
        <path d="M16 11h6m-3-3v6"></path> </svg>
      <h1>Detalle del Perfil</h1>
    </div>
  </header>

  <section class="top-form">

    <div class="row-group">
      <div class="form-group">
        <label for="experiencia">Experiencia (Años) <span class="required">*</span></label>
        <input type="number" class="form-control" placeholder="Años de experiencia" formControlName="experienceYears">
      </div>

      <div class="form-group">
        <label for="estado-estudios">Estado de Estudios <span class="required">*</span></label>
        <ng-select [items]="studyStatus()"
                   bindLabel="educationstatus_name"
                   bindValue="educationStatusID"
                   placeholder="Seleccione estado de estudios"
                   formControlName="studyStatusId">
        </ng-select>
      </div>
    </div>

    <div class="form-group full-width">
      <label>Carrera <span class="required">*</span></label>
      <ng-select [items]="availableCareers()"
                 bindLabel="careerName"
                 bindValue="Id"
                 placeholder="Seleccione carrera"
                 formControlName="careerId">
      </ng-select>
    </div>

  </section>

  <hr class="divider">

  <section class="template-section">

    <div class="template-header">
      <div class="form-group flex-grow">
        <label>Plantilla</label>
        <ng-select class="form-control"
                   [items]="templates()"
                   bindLabel="templateName"
                   bindValue="templateDetailID"
                   placeholder="Seleccione plantilla"
                   formControlName="templateId"
                   (change)="onTemplateSelect($event)">
        </ng-select>
      </div>

      <div class="chips-container" *ngIf="selectedTemplateDetail()">
        <div class="chip-group">
          <label>Conocimientos</label>
          <span class="chip"
                *ngFor="let k of selectedTemplateDetail().knowledges">
            {{ k.knowledgeName }}
          </span>
        </div>
        <div class="chip-group">
          <label>Herramientas</label>
          <span class="chip"
                *ngFor="let t of selectedTemplateDetail().tools">
            {{ t.toolName }}
          </span>
        </div>
      </div>

      <button class="btn-add" title="Agregar nueva plantilla" type="button"
        (click)="toggleCreateTemplate()">+</button>
    </div>

    <div class="template-box" *ngIf="createTemplate()">

      <div class="form-group">
        <label for="nombre-plantilla">Nombre plantilla</label>
        <input type="text" id="nombre-plantilla" class="form-control white-bg"
               placeholder="Ingrese nombre" formControlName="templateName">
      </div>

      <div class="form-group">
        <label for="conocimiento">Conocimiento</label>
        <ng-select class="form-control white-bg"
                   [items]="knowledgeList()"
                   bindLabel="knowledgeName"
                   bindValue="id"
                   placeholder="Seleccione conocimiento"
                   formControlName="knowledgeIds"
                   multiple>
        </ng-select>
      </div>

      <div class="form-group">
        <label for="herramientas">Herramientas</label>
        <ng-select class="form-control white-bg"
                   [items]="toolsList()"
                   bindLabel="toolName"
                   bindValue="id"
                   placeholder="Seleccione herramientas"
                   formControlName="toolIds"
                   multiple>
        </ng-select>
      </div>

      <div class="action-footer">
        <button class="btn-save" type="button" (click)="saveTemplate()">Guardar</button>
      </div>

    </div>

  </section>
  </form>
</div>
