<div class="profile-detail-container">

  <header class="header">
    <div class="title-group">
      <svg xmlns="http://www.w3.org/2000/svg" class="profile-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
        <circle cx="12" cy="7" r="4"></circle>
        <path d="M16 11h6m-3-3v6"></path> </svg>
      <h1>Detalle del Perfil</h1>
    </div>
  </header>

  <section class="top-form">

    <div class="row-group">
      <div class="form-group">
        <label for="experiencia">Experiencia (Años) <span class="required">*</span></label>
        <input type="number" id="experiencia" class="form-control" placeholder="Años de experiencia">
      </div>

      <div class="form-group">
        <label for="estado-estudios">Estado de Estudios <span class="required">*</span></label>
        <select id="estado-estudios" class="form-control">
          <option value="" disabled selected>Seleccione el estado</option>
          <option value="graduado">Graduado</option>
          <option value="cursando">Cursando</option>
          <option value="egresado">Egresado</option>
        </select>
      </div>
    </div>

    <div class="form-group full-width">
      <label for="carrera">Carrera <span class="required">*</span></label>
      <select id="carrera" class="form-control">
        <option value="" disabled selected>Seleccione una carrera</option>
        <option value="software">Ingeniería de Software</option>
        <option value="sistemas">Ingeniería en Sistemas</option>
      </select>
    </div>

  </section>

  <hr class="divider">

  <section class="template-section">

    <div class="template-header">
      <div class="form-group flex-grow">
        <label for="plantilla-select">Plantilla</label>
        <select id="plantilla-select" class="form-control">
          <option value="" disabled selected>Seleccione una plantilla</option>
          <option value="fullstack">Plantilla Fullstack Senior</option>
        </select>
      </div>
      <button class="btn-add" title="Agregar nueva plantilla">+</button>
    </div>

    <div class="template-box">

      <div class="form-group">
        <label for="nombre-plantilla">Nombre plantilla</label>
        <input type="text" id="nombre-plantilla" class="form-control white-bg" placeholder="Ingrese nombre">
      </div>

      <div class="form-group">
        <label for="conocimiento">Conocimiento</label>
        <select id="conocimiento" class="form-control white-bg">
          <option value="" disabled selected>Seleccione conocimiento</option>
          <option value="angular">Angular</option>
          <option value="react">React</option>
          <option value="net">.NET Core</option>
        </select>
      </div>

      <div class="form-group">
        <label for="herramientas">Herramientas</label>
        <select id="herramientas" class="form-control white-bg">
          <option value="" disabled selected>Seleccione herramienta</option>
          <option value="vscode">VS Code</option>
          <option value="sql">SQL Server</option>
        </select>
      </div>

      <div class="action-footer">
        <button class="btn-save">Guardar</button>
      </div>

    </div>

  </section>

</div>
