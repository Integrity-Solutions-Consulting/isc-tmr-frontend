<div class="resources-container">

  <header class="header">
    <div class="title-group">
      <svg xmlns="http://www.w3.org/2000/svg" class="users-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
        <circle cx="9" cy="7" r="4"></circle>
        <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
      </svg>
      <h1>Nivel de Recursos</h1>
    </div>
  </header>

  <section class="counters-list">

    <div class="counter-row">
      <span class="label">Junior</span>
      <div class="controls">
        <button class="btn-control" (click)="aumentar('jun')">+</button>
        <div class="value-box">{{ junior }}</div>
        <button class="btn-control" (click)="disminuir('jun')">-</button>
      </div>
    </div>

    <div class="counter-row">
      <span class="label">Semisenior</span>
      <div class="controls">
        <button class="btn-control" (click)="aumentar('semi')">+</button>
        <div class="value-box">{{ semisenior }}</div>
        <button class="btn-control" (click)="disminuir('semi')">-</button>
      </div>
    </div>

    <div class="counter-row">
      <span class="label">Senior</span>
      <div class="controls">
        <button class="btn-control" (click)="aumentar('sen')">+</button>
        <div class="value-box">{{ senior }}</div>
        <button class="btn-control" (click)="disminuir('sen')">-</button>
      </div>
    </div>

    <div class="counter-row">
      <span class="label">Especialista</span>
      <div class="controls">
        <button class="btn-control" (click)="aumentar('esp')">+</button>
        <div class="value-box">{{ especialista }}</div>
        <button class="btn-control" (click)="disminuir('esp')">-</button>
      </div>
    </div>

  </section>

  <footer class="total-footer">
    <span class="total-label">Total de Personal Requerido:</span>
    <span class="total-value">{{ total }}</span>
  </footer>

</div>
