<div class="service-mode-container">

  <header class="header">
    <div class="title-group">
      <mat-icon class="gear-icon">settings</mat-icon>
      <h2 class="main-title">Servicios y Modalidad</h2>
    </div>
  </header>

  <section class="form-content">

    <div class="form-group">
      <label for="modalidad">Modalidad de Servicio <span class="required">*</span></label>
      <select id="modalidad" class="form-control">
        <option value="" disabled selected>Seleccione una opción</option>
        <option value="presencial">Presencial</option>
        <option value="hibrido">Híbrido</option>
        <option value="remoto">Remoto</option>
      </select>
    </div>

    <div class="form-group">
      <label for="tiempo">Tiempo</label>
      <input
        type="text"
        id="tiempo"
        class="form-control"
        placeholder="Ej: 5 Meses"
      >
      </div>

  </section>
</div>
