<div class="service-mode-container">

  <header class="header">
    <div class="title-group">
      <svg xmlns="http://www.w3.org/2000/svg" class="gear-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      <h1>Servicios y Modalidad</h1>
    </div>
  </header>

  <section class="form-content">

    <div class="form-group">
      <label for="modalidad">Modalidad de Servicio <span class="required">*</span></label>
      <select id="modalidad" class="form-control">
        <option value="" disabled selected>Seleccione una opción</option>
        <option value="presencial">Presencial</option>
        <option value="hibrido">Híbrido</option>
        <option value="remoto">Remoto</option>
      </select>
    </div>

    <div class="form-group">
      <label for="tiempo-cantidad">Tiempo</label>
      <div class="time-inputs">
        <input type="number" id="tiempo-cantidad" class="form-control" placeholder="0">

        <select id="tiempo-unidad" class="form-control">
          <option value="horas">Horas</option>
          <option value="dias">Días</option>
          <option value="meses" selected>Meses</option>
          <option value="anios">Años</option>
        </select>
      </div>
    </div>

  </section>
</div>
