<!-- person-info.component.html -->
<mat-card class="person-info-card">
  <h4 style="font-family: &quot;Poppins&quot;">Sistema de Requerimientos</h4>
  <p class="font-subtitle">Complete la información requerida en cada paso</p>
  <!-- Stepper para navegación paso a paso -->
  <mat-stepper #stepper linear class="custom-stepper">
    <ng-template matStepperIcon="number" let-index="index">
      <!-- Paso completado -->
      <span *ngIf="completedSteps[index]" class="step-circle">
        <mat-icon class="step-completed">check</mat-icon>
      </span>

      <!-- Paso activo sin completar -->
      <span
        *ngIf="!completedSteps[index] && stepper.selectedIndex === index"
        class="step-active"
      >
        {{ index + 1 }}
      </span>

      <!-- Paso no completado -->
      <span
        *ngIf="!completedSteps[index] && stepper.selectedIndex !== index"
        class="step-number"
      >
        {{ index + 1 }}
      </span>
    </ng-template>

    <ng-template matStepperIcon="edit" let-index="index">
      <mat-icon *ngIf="completedSteps[index]" class="step-completed">
        check
      </mat-icon>
    </ng-template>

    <!-- Paso 1: Datos Generales -->
    <mat-step
      [completed]="completedSteps[0]"
      [stepControl]="generalDataForm"
      [editable]="true"
      [state]="getStepState(0) ? 'done' : 'number'"
    >
      <ng-template matStepLabel> </ng-template>

      <div class="step-content">
        <general-data></general-data>
      </div>

      <div class="step-actions step-actions-first">
        <button
          mat-button
          class="itg-primary-btn"
          (click)="saveGeneralDataAndNext()"
          [disabled]="!isStepComplete(0)"
        >
          <mat-icon class="arrow-icon-right">arrow_forward</mat-icon>
        </button>
      </div>
    </mat-step>

    <!-- Paso 2: Servicios y modalidad -->
    <mat-step
      [completed]="completedSteps[1]"
      [stepControl]="serviceModeForm"
      [editable]="true"
      [state]="getStepState(1) ? 'done' : 'number'"
    >
      <!-- -->
      <ng-template matStepLabel> </ng-template>

      <div class="step-content">
        <service-mode></service-mode>
      </div>

      <div class="step-actions">
        <button mat-button (click)="previousStep()" class="itg-primary-btn">
          <mat-icon class="arrow-icon">arrow_back</mat-icon>
        </button>
        <button
          mat-button
          class="itg-primary-btn"
          (click)="saveServiceModeAndNext()"
          [disabled]="!isStepComplete(1)"
        >
          <mat-icon class="arrow-icon-right">arrow_forward</mat-icon>
        </button>
        <!--  -->
      </div>
    </mat-step>

    <!-- Paso 3: Pago y horario -->
    <mat-step
      [completed]="completedSteps[2]"
      [stepControl]="paymentScheduleForm"
      [editable]="true"
      [state]="getStepState(2) ? 'done' : 'number'"
    >
      <!-- -->
      <ng-template matStepLabel> </ng-template>

      <div class="step-content">
        <payment-schedule></payment-schedule>
      </div>

      <div class="step-actions">
        <button mat-button (click)="previousStep()" class="itg-primary-btn">
          <mat-icon class="arrow-icon">arrow_back</mat-icon>
        </button>
        <button
          mat-button
          class="itg-primary-btn"
          (click)="savePaymentScheduleAndNext()"
          [disabled]="!isStepComplete(2)"
        >
          <mat-icon class="arrow-icon-right">arrow_forward</mat-icon>
        </button>
        <!--  -->
      </div>
    </mat-step>

    <!-- Paso 4: Nivel Recursos -->
    <mat-step
      [completed]="completedSteps[3]"
      [stepControl]="resourcesForm"
      [editable]="true"
      [state]="getStepState(3) ? 'done' : 'number'"
    >
      <!-- -->
      <ng-template matStepLabel> </ng-template>

      <div class="step-content">
        <resources-level></resources-level>
      </div>

      <div class="step-actions">
        <button mat-button (click)="previousStep()" class="itg-primary-btn">
          <mat-icon class="arrow-icon">arrow_back</mat-icon>
        </button>
        <button
          mat-button
          class="itg-primary-btn"
          (click)="saveResourcesAndNext()"
          [disabled]="!isStepComplete(3)"
        >
          <mat-icon class="arrow-icon-right">arrow_forward</mat-icon>
        </button>
        <!--  -->
      </div>
    </mat-step>

    <!-- Paso 5: Detalle perfil -->
    <mat-step
      [completed]="completedSteps[4]"
      [stepControl]="profileDetailForm"
      [editable]="true"
      [state]="getStepState(4) ? 'done' : 'number'"
    >
      <!-- -->
      <ng-template matStepLabel> </ng-template>

      <div class="step-content">
        <profile-detail></profile-detail>
      </div>

      <div class="step-actions">
        <button mat-button (click)="previousStep()" class="itg-primary-btn">
          <mat-icon class="arrow-icon">arrow_back</mat-icon>
        </button>
        <button
          mat-button
          class="itg-primary-btn"
          (click)="saveProfileDetailAndNext()"
          [disabled]="!isStepComplete(4)"
        >
          <mat-icon class="arrow-icon-right">arrow_forward</mat-icon>
        </button>
        <!--  -->
      </div>
    </mat-step>

    <!-- Paso 6: Otros conocimientos -->
    <mat-step
      [completed]="completedSteps[5]"
      [stepControl]="knowledgeForm"
      [editable]="true"
      [state]="getStepState(5) ? 'done' : 'number'"
    >
      <!-- -->
      <ng-template matStepLabel> </ng-template>

      <div class="step-content">
        <other-knowledge [knowledgeForm]="knowledgeForm"></other-knowledge>
      </div>

      <div class="step-actions">
        <button mat-button (click)="previousStep()" class="itg-primary-btn">
          <mat-icon class="arrow-icon">arrow_back</mat-icon>
        </button>

        <button
          mat-button
          class="itg-primary-btn itg-primary-btn--tall"
          (click)="saveKnowledgeAndNext()"
          [disabled]="!isStepComplete(5) || isSaving"
        >
          @if (!isSaving) {
            <span>Completar Perfil</span>
          } @else {
            <span>
              <mat-spinner diameter="20" class="inline-spinner"></mat-spinner>
              Guardando...
            </span>
          }
        </button>
        <!--  -->
      </div>
    </mat-step>
  </mat-stepper>
</mat-card>
