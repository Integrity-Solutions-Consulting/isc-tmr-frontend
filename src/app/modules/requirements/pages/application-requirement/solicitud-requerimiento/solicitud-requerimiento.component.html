<!-- person-info.component.html -->
<mat-card class="person-info-card">
  <h4 style="font-family: &quot;Poppins&quot;">Sistema de Requerimientos</h4>
  <p class="font-subtitle">Complete la información requerida en cada paso</p>
  <!-- Stepper para navegación paso a paso -->
  <mat-stepper #stepper linear class="custom-stepper">
    <!-- Paso 1: Datos Generales -->
    <mat-step [completed]="isStepComplete(0)" [stepControl]="generalDataForm">
      <ng-template matStepLabel> </ng-template>

      <div class="step-content">
        <general-data></general-data>
      </div>

      <div class="step-actions step-actions-first">
        <button
          mat-button
          class="itg-primary-btn"
          (click)="saveGeneralDataAndNext()"
          [disabled]="!isStepComplete(0)"
        >
          <mat-icon class="arrow-icon-right">arrow_forward</mat-icon>
        </button>
      </div>
    </mat-step>

    <!-- Paso 2: Servicios y modalidad -->
    <mat-step [completed]="isStepComplete(1)" [stepControl]="serviceModeForm">
      <!-- -->
      <ng-template matStepLabel> </ng-template>

      <div class="step-content">
        <service-mode></service-mode>
      </div>

      <div class="step-actions">
        <button mat-button matStepperPrevious class="itg-primary-btn">
          <mat-icon class="arrow-icon">arrow_back</mat-icon>
        </button>
        <button
          mat-button
          class="itg-primary-btn"
          (click)="saveServiceModeAndNext()"
          [disabled]="!isStepComplete(1)"
        >
          <mat-icon class="arrow-icon-right">arrow_forward</mat-icon>
        </button>
        <!--  -->
      </div>
    </mat-step>

    <!-- Paso 3: Pago y horario -->
    <mat-step
      [completed]="isStepComplete(2)"
      [stepControl]="paymentScheduleForm"
    >
      <!-- -->
      <ng-template matStepLabel> </ng-template>

      <div class="step-content">
        <payment-schedule></payment-schedule>
      </div>

      <div class="step-actions">
        <button mat-button matStepperPrevious class="itg-primary-btn">
          <mat-icon class="arrow-icon">arrow_back</mat-icon>
        </button>
        <button
          mat-button
          class="itg-primary-btn"
          (click)="savePaymentScheduleAndNext()"
          [disabled]="!isStepComplete(2)"
        >
          <mat-icon class="arrow-icon-right">arrow_forward</mat-icon>
        </button>
        <!--  -->
      </div>
    </mat-step>

    <!-- Paso 4: Nivel Recursos -->
    <mat-step [completed]="isStepComplete(3)" [stepControl]="resourcesForm">
      <!-- -->
      <ng-template matStepLabel> </ng-template>

      <div class="step-content">
        <resources-level></resources-level>
      </div>

      <div class="step-actions">
        <button mat-button matStepperPrevious class="itg-primary-btn">
          <mat-icon class="arrow-icon">arrow_back</mat-icon>
        </button>
        <button
          mat-button
          class="itg-primary-btn"
          (click)="saveResourcesAndNext()"
          [disabled]="!isStepComplete(3)"
        >
          <mat-icon class="arrow-icon-right">arrow_forward</mat-icon>
        </button>
        <!--  -->
      </div>
    </mat-step>

    <!-- Paso 5: Detalle perfil -->
    <mat-step [completed]="isStepComplete(4)" [stepControl]="profileDetailForm">
      <!-- -->
      <ng-template matStepLabel> </ng-template>

      <div class="step-content">
        <profile-detail></profile-detail>
      </div>

      <div class="step-actions">
        <button mat-button matStepperPrevious class="itg-primary-btn">
          <mat-icon class="arrow-icon">arrow_back</mat-icon>
        </button>
        <button
          mat-button
          class="itg-primary-btn"
          (click)="saveProfileDetailAndNext()"
          [disabled]="!isStepComplete(4)"
        >
          <mat-icon class="arrow-icon-right">arrow_forward</mat-icon>
        </button>
        <!--  -->
      </div>
    </mat-step>

    <!-- Paso 6: Otros conocimientos -->
    <mat-step [completed]="isStepComplete(5)" [stepControl]="knowledgeForm">
      <!-- -->
      <ng-template matStepLabel> </ng-template>

      <div class="step-content">
        <other-knowledge [knowledgeForm]="knowledgeForm"></other-knowledge>
      </div>

      <div class="step-actions">
        <button mat-button matStepperPrevious class="itg-primary-btn">
          <mat-icon class="arrow-icon">arrow_back</mat-icon>
        </button>

        <button
          mat-button
          class="itg-primary-btn"
          (click)="saveKnowledgeAndNext()"
          [disabled]="!isStepComplete(5) || isSaving"
        >
          @if (!isSaving) {
            <span>Completar Perfil</span>
          } @else {
            <span>
              <mat-spinner diameter="20" class="inline-spinner"></mat-spinner>
              Guardando...
            </span>
          }
        </button>
        <!--  -->
      </div>
    </mat-step>
  </mat-stepper>
</mat-card>
